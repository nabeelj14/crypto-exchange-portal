<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Registration</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #218838; }
        .link { text-align: center; margin-top: 15px; }
        .link a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Agent Registration</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Login ID / Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="pswd" required>
        </div>
        <div class="form-group">
            <label>Mobile Number</label>
            <input type="text" name="mobile" required>
        </div>
        <div class="form-group">
            <label>Locality / City</label>
            <input type="text" name="location" required>
        </div>
        <div class="form-group">
            <label>Assigned Cryptocurrency</label>
            <select name="cryptcurrency">
                <option value="Bitcoin">Bitcoin</option>
                <option value="Ethereum">Ethereum</option>
                <option value="Solana">Solana</option>
            </select>
        </div>
        <button type="submit">Register as Agent</button>
    </form>
    <div class="link">
        <a href="{% url 'home' %}">Back to Home</a>
    </div>
</div>

</body>
</html>
